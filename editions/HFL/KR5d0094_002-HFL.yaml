front:
  text: 原陽子法語卷下夫七
  hash: sha256:6464c42db0838eaad5497c75ed077096e873cda5c99ca51befee6ecfd72d31ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0094_HFL_002-001a, image: hfl/0738/0738-158.png}
body:
  text: 浚儀趙宜真撰門人章貢劉淵然編集警學偈十六首仙聖常憐下士迷甚如慈母惜嬰兒道心亦似兒尋母何患神仙不度伊黄帝曾師七十人人人豈必盡仙眞廣成一見玄機透始覺從前未是親未分甲子初無象纔著形骸便有方吾道强名方外士須忘形象究真常道人唯道即爲身幻假形骸未是親色見聲求難覓我更論年甲愈迷真聞道羅和九十時師年一六正童兒學舞前後尊先達所以能明上下機莫學横行外道魔口頭學得逞嘍囉妬賢誑俗爭名利人我如山慾似河莫學迷夫失正傳不通玄藴駡先賢人間暫作清閑客天上元無懞懂仙莫學狐禪豁達空撥除罪福逞機鋒只將口鼓驚聾瞶不顧他時苦海中莫學邪師誤後賢妄分男女作坤乾取他精血爲丹祖燕雀如何産得鸇心心至道妙難傳假象垂文啓後賢可惜盲人無正眼盡將邪議亂眞詮用盡黄金覓土填救焚加火冷加泉戕生莫甚房中術誤殺閻浮幾少年先地先天真汞鉛無形無象妙通玄無中會得真消息交姤依時證上仙抱元守一立根基打破虚空是了時後學紛紛失中道惑於有作滯無爲纔通機用未圓融直要時時究竟功觸物遇縁無罣碍恁時方許到家中先登覺岸不須舟木爛釘枯豈用收最惜後來問津者倚他檣檝望中流調古情眞不在名趨新諧衆起佳聲吉凶生死一逆旅何用區區立户庭鑑首座與福書記心友乆闊之餘有感而作三教同開道義門心心相契共誰論如何則被游塵隔未信涵天寳鑑昏簡故人要路烹茶結衆縁人天福果幾時圓何如早趁春風裏自把金鋤種寸田題仙弈圖黑白縱横坐運籌不知人世幾春秋就中一著無人會只在仙翁手指頭觀架上荼䕷盛開而海棠獨不花酒邊有感滿架妖紅錦作堆名花幽獨自羞開晚來對酒相看處爲爾傷春不盡杯雩陽王廣文問性命之㫖答頌二首有有有非有無無無不無碧潭秋夜月星散一輪孤水裏月可捉天邊雲可縛收拾入葫蘆便是長生藥自讚體原之陽任道之紀不事標持從他譽毁獨立蒼茫浮雲流水爲徒屬給冠褐授汝星冠爲首元服萬髮包藏兩儀洞燭岀一頭來堂堂露獨授汝絳服爲身之章雲裾濟楚霞佩頡頏百體是覆罔敢弗莊授汝碧簡正其威儀視瞻母側敬恭自持潜心對越如秉大圭授汝黄壇謹其動履八卦周旋九宫步駐鵠立朝元虎拜斯委日記題辭予少從李尊師問道首蒙授以日記一帙令每日但有舉意發言接人應事皆書于帙中其不可書者即不可爲既爲之不問得失必當書之合於理則爲合天心背於理則爲欺天心或未明其理率爾之爲不覺謬戾是廼誤作其過可恕知其背理而忍爲之是乃故作遂成大罪甚至誣罔以掩其非從而不書重其罪矣蓋吾師之意謂人心即天心欺心即欺天故以天心標其帙而又警以偈云天心本與我心同我若欺心昧化工拈起筆時須猛省神明暗室不相容余受教以來佩奉無斁檢束身心始焉與接爲搆日與心鬭覬達於理若極其難久而漸通隨物而應雖未能盡合天心而造夫君子之域庶幾乎萬一免爲小人之歸寔大幸也今同門道者立志不羣有縁相契似可進道尚恕於事物之理未盡通徹寧免爲染習之累而不自覺或得爲而不爲或不得爲而爲之者尤當審擇余因以父師所授天心之說轉相付囑噫九層之臺起於累土千里之行始於足下入道之門積德之基亦必由此始所以期望於同志道者至矣當見眞積力乆一旦豁然心與理融天人合德方知所謂修心即修道也日記之末奚足以見天心印可乎經曰天性人也人心機也此感彼應如影隨形莫見乎隱莫見乎微可不愼哉福慧因果說示上清諸道契嘗聞先達謂人天路上作福爲先生死海中修慧爲本蓋專於修慧者攝性明心堅持戒定以資慧力而證夫道則可以度脫生死苦輪超躋仙祚矣未種縁福不免艱難豈得身心清靜專於作福者濟世度人廣行方便以培福基則當來託生人天受諸快樂矣未證夫道不免身後報盡還來故進道之要須福慧相須不可偏廢獨饒一己未足爲奇自利利他則彼此皆濟昔元始天尊說經一國男女皆受護度老君則修之於身其德乃真至修之於天下其德廼普孔子之克己復禮天下歸仁自意誠心正而至國治天下平皆所以成己成物也佛之稱兩足尊正以其福慧俱備也後來六祖禪師爲碓頭靈濟禪師爲飯頭既成道又伏孽龍泗洲禪師成道而降水母祖天師曰吾丹已成服之必冲舉今當爲國爲民興利除害庶幾他日臣事三境無愧焉廼入蜀降魔區分人鬼興復鹽利惠及邦家葛仙公常行符水救病祭鍊鬼䰟八十萬衆許都仙亦以符藥救病既成道又斬除惡蛟功齊神禹皆苦身勵行福慧並修而後證道桓凱真人修日月高奔之道聞陶隱居門下生徒衆多方投傭做園頭是先證道後修福紫清真人聞金液大還之道又雲游行法濟世度人方依金丞相府修鍊成功是先修福後證道以此知仙佛聖賢爲教若有不同而揆之修己及人則一也但仙佛之修慧修福則志在於度世善惡之報則取驗於三生聖賢之成己成物則志在於治世善惡之報則取驗於見世爲小異耳經曰鬼神禍淫而福謙作善降之百祥作不善降之百殃此聖賢論鬼神因果之事固當於理予少時讀書亦知其然矣及歷經世故觀已然之迹或有不可槩而論者如堯舜大聖人豈不能位天地育萬物而有九年滔天之水致下民昏墊知人則哲能官人已而治水誤用鯀成湯亦聖人而有七年大旱及以六事自責而後雨何不早圖至於顔賢而夭跖盜而壽伯道無兒古今凡如此者不可勝紀近自兵興以來觀里閈間有累世爲善士賢儒明經修行者多固窮其福慶不在其身當在其子孫今廼絶滅無遺類豈皆不孝人乎有奸宄暴横者今皆富庶益昌若以見世善惡之說驗之固已爽矣若以三生因果之說推之則灼然可信是宜兩說並行斯無遺矣昔聖代昏墊者皆葬魚腹與季世填溝壑墮顛崖塗炭者又何異是皆前生所作定業際會一時償其業債試觀夫今之聦明者或多貧夭而愚鈍者或多壽富何也蓋聦明者專尚文學不信因果及其再來則聦明有加貧困甚矣愚鈍者雖不事文學信尚福縁及其再來則富壽有加愚鈍不易矣俗諺云不能言者青雲上不識字者黄金多是必有其故矣若既有聦明文學又能修種福縁則當來富貴聦明兼之宜也大抵人生所爲皆是自己做下來生模子造物豈容心哉持假手爲之陶瀉爾或謂人既死未信其神不滅有因果轉輪從而並以神仙爲渺茫是自昧其本眞也徒爲世外高人所嗤夫神附形則爲人人死神不滅則謂之鬼精氣爲物是即形也游魂爲變是即鬼也先聖既知其有情有狀又知其能爲禍福能降祥殃鄉人儺則朝服立於阼階謂使祖先䰟氣有所依憑不至驚怖而後學猶以幽冥鬼神事爲無乎秦兵不壞孔子宅爲聞有金石絲竹之音若無鬼神以司之果自響乎邵子詩云身在天地後心在天地先天地自我出其餘何足言而敢謂神可滅亡乎黄帝成道騎龍上天載於青史朱子詩曰金鼎蟠龍虎三年養神丹刀圭一入口白日生羽翰猶謂神仙之道爲渺茫乎昔有議仙而竟遇仙詆佛而竟從佛論無鬼而卒見鬼者辭有時而窮矣是皆人我偏見未暇與辯適有議神仙鬼神之事與夫善惡之報或有爽於斯世者似無以勸懲遂廣引前說以諭之且夫人生世間以有限之光隂逐無窮之事物合眼成夢六趣分明凡俗罔知恣縱情慾認苦爲樂如醉弗醒吾黨之士既聞斯道正好力行行無所行方了大丈夫能事何可因循世故隨逐幻縁虚負此生良可惜也故首舉福慧雙修之說期與同志者共勉因並書以質之吾友子璵吴鍊師而次諸道契列仙高明之見以爲然乎否乎率湖廣武當宫諸學者刊道德經文始經題辭道藏經典皆所以化民爲善而至於道也傳世既遠誦習者多唯太上老君所著道德經關尹真人所著文始經皆研窮性命道德之源造化鬼神之故而誦習者獨鮮見豈至理幽微未易探賾歟抑兵燹之後典籍罕存歟宜真昨來由瓊林望嵩華採摭遺經正興此歎道經江夏因就武當宫率諸學者並力繡梓以廣流通故爲之題辭右伏以五千餘言道德經實彌綸於大化百八十章關尹子復流演於玄綱二書相傳萬聖攸則蓋心由經悟非經無以見心道匪言傳因言所以顯道若向箇中參透便能言外貫通神化宜民皇建有極方今天子已訓註於斯文用廣聖謨益流通於昭代兹欲再新傳刻是須衆力圓成復函關樓觀之遺編如碧落浮黎之出教使聞是經者莫不尊道而貴德咸歸衆妙之門而善爲士者能知執古以御今是謂不言之教坐化頌遁世和光了幻縁縁消幻滅獨超然清風遍界無遮碍赫日當空照大千原陽子法語卷下
