body:
  text: 浚儀趙宜真撰門人章貢劉淵然編集還丹金液歌並叙唯道集虚本無二致而修鍊有内丹外丹之分者縁遇不同功用少異而造道則一也所謂内者自性法身本來具足不假於外自然之真其進修之功則攝情歸性攝性還元有爲之爲出於無爲無證之證所以實證胎圓神化脫體登眞訣曰一靈眞性號金丹四假爲爐鍊作丸是爲真一爲玄一又名内丹也所謂外者幻假色身未免敗壞必資外藥點化成真其服鍊之功則取日月之精華奪乾坤之造化刀圭入口情慾頓消骨肉都融形神俱妙白日沖舉上賔玉清訣曰木液本自丹砂出金鍊木液還丹體丹復化金金而液之是爲還丹爲金液又名外丹也曰内曰外又各有内外之說焉攝情歸性本之於外攝性還元本之於内性寂情空則非動非靜更無内外矣此内丹之所謂内外也内存木液以爲祖外假真鉛以制之内藥既伏則外藥委棄亦無内外矣此外丹之所謂内外也但内景微妙無形無名聖師不得已而假外丹之名象以譬之發明其理使人易悟故亦謂之金液還丹孰知末學泥於名象而返致疑或者以丹道有内外之說似乎多岐未知孰是夫此道如一大城四方來者如就傍蹊曲徑則多涉程期甚至迷而他適若由正路坦途有從東門入者有從南西北門入者及到城中則一也四方門路復何有哉釋有念佛而入者有參禪而入者積一千八百公案及到悟處參念俱無道有修内丹而進者有鍊外丹而進者演三千六百法門及其證道修鍊俱無公案法門皆非所有如得魚忘筌得兔忘蹄烏可以彼此而是非之昔天尊說法萬八千篇世尊說經五千餘卷有若太繁至東華開化獨顯全眞達磨西來不立文字有若太簡然悟則頭頭是道無簡亦無繁迷則處處暗途愈求而愈遠矣又烏可以繁簡而去取之或者學非其道妄釋丹經引證易曰一隂一陽之謂道乾道成男坤道成女而以人之男女象天地爲鼎爐取其隂陽以爲藥物不知大道本無男女之象仙師託象爲喻者蓋指先天對待之理非後天形質之謂訣曰可見者不可用可用者不可見正内丹藥物之㫖也先達詩云一物元來有一真一身還有一乾坤須知萬物備於我肯使三才别立根仙師亦云自家身裏有夫妻又云一夫一婦將六兒皆謂一身之中具此造化不自外來請舉一二内丹之成道者證之佑聖真君七歳入太和山修行沖舉虚靖天師亦七歳入上清宫修行尸解當時何從而得藥物乎其爲自足於己非求之於他人者灼然可知若執邪見去道遠矣如黄界赤書等文本爲有家者節慾養生而設後人因之返以縱慾戕生可不戒之至於外丹大藥亦不自彼我人身而得雖世間五金八石皆天地後生有質之物尤非所用縁此藥本無廼自有質之中取其氣液無中生有者是也訣曰有象不堪爲伴侣無質生質號還丹流俗罔知或以爲勾點左術而謗議正道是廼自速厥辜當墮無間矣或者以心即道也道則無形無象而外丹無質生質似無交涉且執於有作寧免落空試以醫術論之人有爲風邪所中或爲猘犬所嚙者其傷在於形氣而其證廼能使心痛神迷顛狂譫妄不記人事又有爲驚憂思慮所惱致怔忡顛狂者其傷與證皆在於心及服外藥理其形氣而能使心神安靜非有交涉之理焉能至是蓋太極未判函三爲一纔有動靜便分隂陽品物流形而各具太極理氣相須一本乎道有無相制所以然也治鍊外丹雖屬有作得而服之全無所爲不須修習即形返太無神歸大定復還太極混然之初而與道合真矣原其受生則賦命隂陽陶形天地囿乎二氣五行之中及其證道則把握隂陽挈持天地而超乎二氣五行之外形不可得而斃神不可得而逝如以火鍊金金既出曠復令入曠不可得也寧免落空或者又疑肉身未信其可騰化夫以神異之事質之尋常之見誠不能無疑且如龍化虎變尚可以蹈虚空莧菹剖鱉朱草剖人亦可以分神泮氣散形老楓化爲羽人朽麥化爲蝴蝶自無情而之有情也賢女化爲貞石山蚯化爲百合自有情之無情也是故土木金石皆有情性精𩲸比之蟲獸草木皆能變化無妨人獨靈於萬物形肖兩儀道參三極已是半仙丹則奪造化之巧盜天地之和人又得以餌之宜其滓穢消融如氷雪之釋即形化氣氣化神神還虚而頓超聖地豈非最上一乘之基乎昔太上老君學於無上元君首云學者審欲成仙不服還丹金液徒自苦耳爲寒温風濕鬼氣所擊雖司命弗能救也合作神丹早自防衛勞苦須臾一成便仙樂可央乎粤自周秦漢晋唐宋以前諸大仙之證道賔空者莫不由之其過化之處則有丹巖丹室丹井丹泉丹爐藥臼皆迨今可見其著述之書則有太清丹經抱朴火記草衣歌頌迨今可考若以尋常方術議之而未信其道是猶醯雞不知有天地之大也柰何智者滯於頑空或流豁達昧者執於偏見誤入傍蹊或有乍入玄門罔知參學便爾枯坐或事久立或學搬運或爲觀想未能制心而强抑之久則發爲顛狂或無知妄誕厮挺爭强或專學口鼓馳逞辯辭或略有半見一知便爾誇能傲俗或未能真參實悟便立門風致人尊奉或盜竊靈文冒名頂派好爲師範鼓眩盲聾又有或專齋戒或學辟穀或尚怪形或爲異服在俗多所推重於道了不相干古人有資生治産者俄而冲舉有飲酒餌葷者倏而仙去蓋其存心物外混俗潜修蓋非常人所能測烏可以形迹求之哉噫道之不明不行也未有甚於此或不知察廼相與議曰某以進道而病某以修鍊無成某以服食而斃從而以道爲不可學並耻於談而不知古今之登真成道者不可勝紀若以誤者無成者無知者一槩而論是猶因咽而廢食知其然者而不知其所以然者大抵參學之難有四進道之難有十不可不知也何則一曰道路脩阻江湖風波人海茫茫孰可師問二曰寒暑切身朝夕所窘學未有聞灾患不測三曰昧者詐裝高道知者緘默混塵學者未能知人多誤參禮四曰真師雖遇志行未孚難以與進或雖與進而授學未備幸而學備年齒邁矣此其爲參學之難也一者早遇眞師開明正道二者果有德行上合天心三者發弘誓願普濟生靈四者依大福力方免障魔五者有其鎡基際其縁會六者結交仙友志行相孚七者屏絶塵紛棲身清靜八者飲食有節起居有常九者謹口力行不招謗議十者寅奉神真精誠弗怠此爲進道之基尤難能也二難之中苟虧其一難獲全功如陶隱居登真隱訣備陳修鍊禁戒之事天台止觀圭峯修證儀亦具明魔事預備不虞今人劣於參學速於求成多見其不知量也然或有能盡其道而猶不免於禍害者如釋迦文佛割切肢體定光古佛刺配南安顔回短命子路爲醢公冶縲絏伯牛有疾張果爲紂所擊郭璞爲敦所刑紫陽三遭徒刺清菴卒梗於茶雖皆患難不能移死生非所有要知骨肉永融難逃定業經曰陸行不避兕虎入軍不避甲兵蓋爲道成者云耳豈學道者所遽能哉且嘗聞紫清白真人雲遊九年辛苦萬狀方遇真師又二十年方得寄食洪都金丞相府潜修十年功成仙去顧前代仙佛聖賢尚爾魔難不一况學者乎而又不可病其難而易其志凡爲道者之學仙佛亦猶儒者之希聖賢只合堅心一志勤而行之若夫成功則天也亦奚容固必哉然此妙道一歷耳根永爲聖種故關尹真人曰聞道於朝可死於夕蓋謂學者雖未能造夫體道之極功而校之俗學與未學者亦大有徑庭矣伏蒙方壺贊教真人賜以手書舉似玄迪秘語廼大還外丹之說也宜真亦嘗師太清道士李先生得之已三十年鮮有談及者兹又得以披誦因記稚川葛真人曰自承鄭君還丹金液之經今二十年家無擔石之儲貧苦無用買藥徒知其方與不知者正同可爲長歎之語有感而序于以識警策之意釋信向之疑仍賦還丹金液歌以復將命者惟真人積學老成酖酣道妙幸一采覽而有以教之實所願聞也其歌曰方壺宫中老仙伯燕坐薄團室生白大千沙界納毫端妙契一元守淵默我昔南昌遇至人曾聞丹訣能通真卷舒造化還溟涬匹配隂陽在時頃鼎非鼎爐非爐乾坤闔闢同規模火即藥藥即火日月升沈無彼我青衣蘂女素練兒洞房媒合成姻期無中生有爲丹祖便是眞鉛天地母制汞成丹還棄鉛絶似兒成母歸土丹成化金金液之到口白日登天墀胡爲皓首猶塵世大藥無資難擇地會當入室調火符功成駕鶴從方壺真道歸一偈奉答金門羽客致虚貞白惟一眞人方壼贊教方尊師至道之真肇形氣建立三才資萬類細歸無朕大無垠前瞻無首後無際周行體物孰能達獨露孤峯没遮蔽會教眼耳鼻舌忙寧有壞空成住累等閑一指見三身謾說千言無一字羲皇妙契開鴻濛因民立極明降衷畫前有易本無象圈外無極原非空仰觀俯察文理宻鳶飛魚躍昭著同勿忘勿助愼其獨惟精惟一執厥中至誠不息安所止天載合德成極功真人知命貴食母致虚觀復爲丹祖獰威制伏如虎龍定慧燮調比文武攝情還性歸一元元一並忘忘亦去囊括三界入虚空粉碎虚空絶倫伍從教劫盡等河沙耿耿靈明照今古沙門未究德充符單提狗子佛性無疑團結就無縫隙猶如大死方還蘇驀然悟得西來意自信渠今即是吾泥牛變作獅子吼不與萬法爲侣徒於一切處皆具足儔敢承當是丈夫聖賢仙佛分門户畢竟到家同一路身心了外更無玄早合真參求實悟蒼茫何處覓真師玄經誤讀誰能知傍蹊側徑紛趨嚮滯無惑有成愚癡疑團未啓云悟性故紙頻鑽爲話柄只將辯舌逞機鋒豈識拈花真究竟最憐多少野狐禪言清行濁迷真詮仙縁有分在明德天道無親必與賢吾祖蓬頭埜菴老武夷峯頭事幽討時於聖井引新潮麗澤涵濡弘至道金門羽客方壺公曾從吾祖坐春風祖云見性語自别不待師傳妙悟通壼公造道仍探賾朝來問我見性策一聲長嘯天地春金烏飛出東方白紀學混成有物超太初萬品由布羣情敷獨來獨往成變化不增不減隨形模歷經浩劫靡終極總攝元化潜虚無我昔少年衣縫掖繼晷焚膏勤讀易三尺星芒已燭天二堅流殃旋晦迹厭看濁世六塵昏夢熟黄粱諸幻息壽昌仙伯鐵玄翁曾於聖井師金公歸向青華開泰宇食我法乳蘇疲癃繼後從游李夫子聞有蒲衣馮外史亦師金祖紹仙宗駐鶴龍沙明至理翩然躡屩往問之萬法歸一一何歸外史于時方燕坐雷霆迅厲虚空破詰我問從甚處來清風拶透迷雲開廓然溥見家家月了照本來無所說題林下高風圖眞常妙體本無象象外承當須力量撢持日月由主張闔闢隂陽任收放崆峒老仙氷雪姿一唯心傳能記往清秋皓月掛瓊臺蔾杖雲裾披鶴𧝟我家浚儀原之陽一嘘萬物迴春光曾鼓風霆捍魑魅長教匣劎藏星芒昨來訪舊崆峒上相期駐景望八荒金精攬結制木液招摇坐運凝玄霜箇中妙契混魚水餘外紛紛何足齒玄都道士東郭子徒貌丹青勞畫史對此孰云以色見定求象外本來面問我本來在何處揮塵一笑乘風去題授受圖至道匪言傳因言資妙悟所以函谷篇直指眞元路鍾吕相承啓後賢派分南北垂千年宇宙在手步玄紀日月停景開金蓮我曾劎佩追芳躅腊虎膾龍宴瑶屋三華隱隱泛流霞四海茫茫信行獨昨來孤鶴乘天風遊觀嵩華超崆峒洞簫吹齗山水緑世外襟期誰與同種桃道士淵然者行潔神清志閑雅供薪煑石服勤勞立雪忘軀輕幻假受我登眞贊化書有時入海探驪珠鞭霆馭氣凌紫極按節回杓歸太无崆峒十載重逢日已見圖形記疇昔何如體取身外身微妙冲虚本無迹勉進道偈出家所以超塵俗割斷恩情免牽逐簞瓢涉遠投明師服勞盡力期忠告積精養氣保元和鍊性降心明智燭内功微妙貴潜修外行辛勤須備足離形絶巧黜總明晦迹和光守窮獨攝邪歸正贊神明濟物利生廣縁福先人後己摧貴高忍忿含羞忘寵辱麄衣淡飯捨榮華折難消愆除鬼録福縁慧力既兩全名署丹臺位列仙策空游神覽無際俯視溟渤如蝸涎億劫種親皆受慶豈但君師父母前縱然宿業生魔障報盡還當道果圓云胡季世簪星者不悟辭親爲究玄愛河慾海甘淪溺利鎻名韁長絆纏自家昧却本來面外物圖爲異姓傳一朝身謝都抛下業趣相隨疇見憐我今曉示諸同學富貴賤貧分厚薄孰云計巧財偏多幾多計巧衣無著豈無謀踈室磬懸亦有謀踈田負郭要皆前世積因由受分今生如契約盛衰造物已安排何用孜孜苦貪著在家尚學忘家禪念善背塵思合覺況是無家物外人當於方外尋真樂回頭疾早莫蹉跎仙佛教人應不錯君不見丹陽稅莊賽半州棄如弊屣何曾收鹿皮蓋衲百家飯夫婦千里相離休又不見龐公家富債不取鹿門灘裏金長留團欒共說無生話女賣罩籬男飯牛二翁高誼絶利慾尊道貴德輕時流休論上士難比擬有分人人皆可求景行自合仰玄契纏腰何用趨揚州華林記讖已千載八百之中期與侔記疇昔李尊師授玄一之道滕王高閣仲秋間重拜仙翁受大還半夜風雷度滄海一時雲雨到玄關春光入地金芽長斗柄周天玉漏殘月滿太虚仍跨鶴翩翩飛上玉京山道劎親授純陽道劎方不須歐冶鑄堅鋼同身禀命生機巧隨意成形殺氣張澗底磨鋒飛電影月中斫桂染天香有時掛在南山下懗得隂魔遠遁藏奉和李尊師期往龍門紫玄觀製神藥不至見寄公是重來維厶袁龍門舊隱已千年道參象帝無名始學究羲皇未畫前金氣應時仍進火汞華凝處漸抽鉛神樓一匕能分我便逐翔鸞謁上仙唐仙人羅公遠出入禁闥游戲神通當時明皇忌之召至殿前伏兵射死敕殯之舉棺甚輕啓而視之竟失所在止存二屨一日有貢橘至者明皇剖之每一橘中拆一辦因詰問來使使對曰路逢一眇道士索橘不與只借一嗅而去且囑曰見上位時請爲道維厶袁稽首上笑曰此羅公遠也其修鍊之所在太和縣龍門太玄觀觀近即三華山山上爲飛升之所半山有紫玄觀祠之留寓雲隱山一日舉三教一家話時清源山福書記於言下致疑經月餘再會復舉前話頓有省悟次日袖香具方服詣山禮謝仍示偈八句有宿山之意就和答棄惡仍圖長善芽無根樹子結空花回頭自是三身佛覿面何須百丈茶凡聖等觀無彼此靈明寂照徧河沙春來處處風光好何必山中遠世華福書記别後再用前韻見寄又和答混淪甚處覔根芽了了由渠轉法華何日共斟東老酒爲君重點趙州茶坐來時刻成千載覷破乾坤眇一沙可惜林林不回首浮生空老幾韶華答知白鍊師議論道法偈三首誰識清微大法王三才萬物此開張從來法法皆由我倒用横拈總不妨人知此道只虚空豈悟眞空卻不空一月徧涵千澗水清光元自不留蹤方寸心田了了時隨方應化總無爲迷人但見行千里兩脚何曾半步移磨子頌答胡知觀頂門一竅納珠璣化作通身白雪飛這裏鐵心無退轉左來右去任推移和巴陵鄭宰題岳陽純陽飛吟亨偈句五首岳陽行徧識無人飛度平湖獨朗吟回首三出烟霧隔刹那滄海又桑林嬌癡蘂女惜嬰兒正是秋中半夜時顛倒隂陽孕靈質茫茫四海與誰師藥材老嫩要知時採餌刀圭自可支消盡群隂乾體就懷胎應信有男兒碧落空歌集萬仙懸珠五丈說重玄道包太極歸元命妙契靈臺不在言阿誰能共覈玄玄一笑相忘天外天揮手長歌弄明月凌風三叠舞胎仙原陽子法語卷上
